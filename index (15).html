<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BioLab Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --text: #e8e6e1;
    --muted: #6b7280;
    --accent-blue: #378ADD;
    --accent-teal: #1D9E75;
    --accent-purple: #7F77DD;
    --accent-amber: #EF9F27;
  }

  html, body {
    width: 100%; min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* ── Overlay (karartma + geçiş) ── */
  #overlay {
    position: fixed; inset: 0; z-index: 100;
    background: #000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #overlay.fade-in  { opacity: 1; pointer-events: all; }
  #overlay.fade-out { opacity: 0; pointer-events: none; }

  /* ── Scan line efekti overlay üzerinde ── */
  #overlay::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 4px
    );
    animation: scanlines 8s linear infinite;
  }
  @keyframes scanlines { from { transform: translateY(0); } to { transform: translateY(4px); } }

  /* ── Launch label ── */
  #launch-label {
    position: fixed; inset: 0; z-index: 101;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    font-size: 11px; letter-spacing: 0.3em; color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }
  #launch-label.visible { opacity: 1; }

  /* ── Ana sayfa ── */
  #page {
    width: 100%; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 3rem 2rem;
    gap: 2.5rem;
  }

  /* ── Header ── */
  .header { text-align: center; }

  .header-eyebrow {
    font-size: 10px; letter-spacing: 0.4em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0; animation: fadeUp 0.8s 0.1s forwards;
  }

  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 6vw, 64px);
    color: var(--text);
    line-height: 1.05;
    letter-spacing: -1px;
    opacity: 0; animation: fadeUp 0.8s 0.25s forwards;
  }

  .header-title em {
    font-style: italic;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.3);
  }

  .header-sub {
    margin-top: 14px;
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.05em;
    opacity: 0; animation: fadeUp 0.8s 0.4s forwards;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    max-width: 680px; width: 100%;
    opacity: 0; animation: fadeUp 0.8s 0.55s forwards;
  }

  /* ── Kart ── */
  .card {
    background: var(--surface);
    padding: 2rem 1.75rem;
    cursor: pointer;
    display: flex; flex-direction: column; gap: 1rem;
    position: relative; overflow: hidden;
    transition: background 0.2s;
    border: none; text-align: left; color: inherit;
  }

  .card::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card-go::before    { background: radial-gradient(ellipse at 0% 0%, rgba(55,138,221,0.12), transparent 60%); }
  .card-deep::before  { background: radial-gradient(ellipse at 100% 0%, rgba(29,158,117,0.12), transparent 60%); }
  .card-halo::before  { background: radial-gradient(ellipse at 0% 100%, rgba(127,119,221,0.12), transparent 60%); }
  .card-cazy::before  { background: radial-gradient(ellipse at 100% 100%, rgba(239,159,39,0.12), transparent 60%); }

  .card:hover { background: #161a20; }
  .card:hover::before { opacity: 1; }

  /* accent line */
  .card::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card-go::after    { background: var(--accent-blue); }
  .card-deep::after  { background: var(--accent-teal); }
  .card-halo::after  { background: var(--accent-purple); }
  .card-cazy::after  { background: var(--accent-amber); }
  .card:hover::after { opacity: 1; }

  .card-number {
    font-size: 10px; letter-spacing: 0.3em; color: var(--muted);
  }

  .card-name {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; line-height: 1.1;
    color: var(--text);
  }

  .card-desc {
    font-size: 11px; color: var(--muted);
    line-height: 1.6; letter-spacing: 0.02em;
  }

  .card-tags {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px;
  }

  .tag {
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 3px;
    border: 1px solid;
  }
  .tag-blue   { color: var(--accent-blue);   border-color: rgba(55,138,221,0.3);   background: rgba(55,138,221,0.06); }
  .tag-teal   { color: var(--accent-teal);   border-color: rgba(29,158,117,0.3);   background: rgba(29,158,117,0.06); }
  .tag-purple { color: var(--accent-purple); border-color: rgba(127,119,221,0.3); background: rgba(127,119,221,0.06); }
  .tag-amber  { color: var(--accent-amber);  border-color: rgba(239,159,39,0.3);  background: rgba(239,159,39,0.06); }

  .card-arrow {
    position: absolute; right: 1.5rem; bottom: 1.5rem;
    font-size: 18px; color: var(--muted);
    opacity: 0; transform: translate(-4px, 4px);
    transition: opacity 0.25s, transform 0.25s;
  }
  .card:hover .card-arrow { opacity: 1; transform: translate(0, 0); }

  /* ── Footer ── */
  .footer {
    font-size: 10px; color: var(--muted); letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0; animation: fadeUp 0.8s 0.7s forwards;
    text-align: center;
  }

  .dedication {
    font-size: 10px; color: rgba(255,255,255,0.18);
    letter-spacing: 0.15em; text-transform: uppercase;
    margin-top: 0.5rem;
    opacity: 0; animation: fadeUp 0.8s 0.85s forwards;
    font-style: italic;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .grid { grid-template-columns: 1fr; }
    .card { padding: 1.5rem; }
    .header-title { font-size: 32px; }
  }
</style>
</head>
<body>

<div id="overlay"></div>
<div id="launch-label">launching...</div>

<div id="page">
  <div class="header">
    <div class="header-eyebrow">ibsb · research tools</div>
    <h1 class="header-title">Bio<em>Lab</em><br>Portal</h1>
    <p class="header-sub">Biyoinformatik araçlarına tek noktadan erişim</p>
  </div>

  <div class="grid">
    <button class="card card-go" onclick="launch('https://gosearchappibsb2.vercel.app/', 'GO Search')">
      <span class="card-number">01</span>
      <span class="card-name">GO Search</span>
      <span class="card-desc">Gene Ontology terimleri için çok kaynaklı arama motoru</span>
      <div class="card-tags">
        <span class="tag tag-blue">NCBI</span>
        <span class="tag tag-blue">UniProt</span>
      </div>
      <span class="card-arrow">↗</span>
    </button>

    <button class="card card-deep" onclick="launch('https://deep-dive-five.vercel.app/', 'DeepDive')">
      <span class="card-number">02</span>
      <span class="card-name">DeepDive</span>
      <span class="card-desc">Bakteri genlerini derinlemesine keşfetmek için gen bulma aracı</span>
      <div class="card-tags">
        <span class="tag tag-teal">BacDive</span>
        <span class="tag tag-teal">NCBI</span>
      </div>
      <span class="card-arrow">↗</span>
    </button>

    <button class="card card-halo" onclick="launch('https://halomonas-scout.vercel.app/', 'Halomonas Scout')">
      <span class="card-number">03</span>
      <span class="card-name">Halomonas<br>Scout</span>
      <span class="card-desc">Halomonas sp. türlerinde hedefli gen ve protein arama</span>
      <div class="card-tags">
        <span class="tag tag-purple">NCBI</span>
      </div>
      <span class="card-arrow">↗</span>
    </button>

    <button class="card card-cazy" onclick="launch('https://cazysearch.vercel.app/', 'CAZySearch')">
      <span class="card-number">04</span>
      <span class="card-name">CAZy<br>Search</span>
      <span class="card-desc">Karbonhidrat aktif enzimler için organizma ve protein arama</span>
      <div class="card-tags">
        <span class="tag tag-amber">CAZy</span>
      </div>
      <span class="card-arrow">↗</span>
    </button>
  </div>

  <div class="footer">Bir karta tıkla · geçiş başlar</div>
  <div class="dedication">Akın Arlı'nın Hayratıdır</div>
</div>

<script>
function launch(url, name) {
  const overlay = document.getElementById('overlay');
  const label   = document.getElementById('launch-label');

  label.textContent = 'launching ' + name.toLowerCase() + '...';

  overlay.classList.add('fade-in');

  setTimeout(function() {
    label.classList.add('visible');
  }, 200);

  setTimeout(function() {
    window.open(url, '_blank');
  }, 700);

  setTimeout(function() {
    label.classList.remove('visible');
    overlay.classList.remove('fade-in');
    overlay.classList.add('fade-out');
    setTimeout(function() {
      overlay.classList.remove('fade-out');
    }, 600);
  }, 1200);
}
</script>
</body>
</html>
